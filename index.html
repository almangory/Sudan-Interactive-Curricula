<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>المنصة التفاعلية sd</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🇸🇩</text></svg>">
    
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🇸🇩</text></svg>">
    
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#397B8C" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="المنصة تفاعلية" />
    
    <script>
      // معالجة أخطاء WebSocket البيئية
      window.addEventListener('unhandledrejection', function(event) {
        if (event.reason) {
          const msg = typeof event.reason === 'string' ? event.reason : (event.reason.message || '');
          if (msg.includes('WebSocket') || msg.includes('websocket') || msg.includes('vite')) {
            event.preventDefault();
            event.stopImmediatePropagation();
          }
        }
      }, true);
      window.addEventListener('error', function(event) {
        const msg = event.message || '';
        if (msg.includes('WebSocket') || msg.includes('websocket') || msg.includes('vite')) {
          event.preventDefault();
          event.stopImmediatePropagation();
        }
      }, true);

      // تسجيل الـ Service Worker لتفعيل التثبيت على الجوال
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => console.log('[Service Worker] Registered successfully:', reg.scope))
            .catch((err) => console.error('[Service Worker] Registration failed:', err));
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
