<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Premium Metallic Gold Gradient for 3D look -->
    <linearGradient id="gold-metallic" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9B6F1A" />
      <stop offset="20%" stop-color="#D4AF37" />
      <stop offset="45%" stop-color="#F3D993" />
      <stop offset="55%" stop-color="#FFF8E1" />
      <stop offset="70%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#845D10" />
    </linearGradient>

    <!-- Subtle Drop Shadow to elevate the golden elements -->
    <filter id="subtle-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.15" />
    </filter>

    <!-- Glow effect for the golden icons -->
    <filter id="gold-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g filter="url(#subtle-shadow)">
    <!-- ========================================== -->
    <!-- 📖 THE GOLDEN OPEN BOOK (Bottom Section) -->
    <!-- ========================================== -->
    
    <!-- Central book spine/binding -->
    <path d="M 250,225 L 250,295" stroke="url(#gold-metallic)" stroke-width="4.5" stroke-linecap="round" />
    
    <!-- Book Outer Cover / Bottom Rim -->
    <path d="M 250,290 C 210,274 150,274 110,300 C 150,308 210,308 250,293" fill="none" stroke="url(#gold-metallic)" stroke-width="3" stroke-linejoin="round" />
    <path d="M 250,290 C 290,274 350,274 390,300 C 350,308 290,308 250,293" fill="none" stroke="url(#gold-metallic)" stroke-width="3" stroke-linejoin="round" />

    <!-- Left Page Layer 1 (Outer Page) -->
    <path d="M 250,285 C 210,268 150,268 112,295 L 125,215 C 160,192 215,192 250,208 Z" fill="none" stroke="url(#gold-metallic)" stroke-width="3.5" stroke-linejoin="round" />
    <!-- Left Page Layer 2 (Middle Page) -->
    <path d="M 250,288 C 213,272 160,272 122,297 L 133,222 C 168,200 218,200 250,214" fill="none" stroke="url(#gold-metallic)" stroke-width="2" stroke-linejoin="round" opacity="0.85" />
    <!-- Left Page Layer 3 (Inner Page) -->
    <path d="M 250,291 C 216,276 170,276 132,299 L 141,229 C 176,208 221,208 250,220" fill="none" stroke="url(#gold-metallic)" stroke-width="1.5" stroke-linejoin="round" opacity="0.7" />

    <!-- Right Page Layer 1 (Outer Page) -->
    <path d="M 250,285 C 290,268 350,268 388,295 L 375,215 C 340,192 285,192 250,208 Z" fill="none" stroke="url(#gold-metallic)" stroke-width="3.5" stroke-linejoin="round" />
    <!-- Right Page Layer 2 (Middle Page) -->
    <path d="M 250,288 C 287,272 340,272 378,297 L 367,222 C 332,200 282,200 250,214" fill="none" stroke="url(#gold-metallic)" stroke-width="2" stroke-linejoin="round" opacity="0.85" />
    <!-- Right Page Layer 3 (Inner Page) -->
    <path d="M 250,291 C 284,276 330,276 368,299 L 359,229 C 324,208 279,208 250,220" fill="none" stroke="url(#gold-metallic)" stroke-width="1.5" stroke-linejoin="round" opacity="0.7" />


    <!-- ========================================== -->
    <!-- 📈 THE GROWTH CHART & LEAF SPROUT (Center) -->
    <!-- ========================================== -->
    
    <!-- Central Trunk / Stem -->
    <path d="M 250,225 L 250,150" stroke="url(#gold-metallic)" stroke-width="4" stroke-linecap="round" />

    <!-- Left Sprout Leaf 1 (Lower Left) -->
    <path d="M 250,210 C 225,200 215,180 230,170 C 245,160 250,190 250,210 Z" fill="url(#gold-metallic)" opacity="0.9" />
    <!-- Left Sprout Leaf 2 (Upper Left) -->
    <path d="M 250,175 C 220,165 210,140 228,132 C 246,124 250,155 250,175 Z" fill="url(#gold-metallic)" />
    <!-- Center Top Sprout Leaf (Summit) -->
    <path d="M 250,140 C 240,120 240,95 250,90 C 260,95 260,120 250,140 Z" fill="url(#gold-metallic)" />

    <!-- Growth Bar-Chart/Geometric Lines (Rising Right) -->
    <!-- Base horizontal platform from book -->
    <path d="M 200,212 L 300,212" stroke="url(#gold-metallic)" stroke-width="2.5" stroke-linecap="round" />
    
    <!-- Rising line chart connecting spine to arrow -->
    <path d="M 210,212 L 235,185 L 265,195 L 302,145 L 302,175" fill="none" stroke="url(#gold-metallic)" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" />
    
    <!-- Vertical Progress bar pillars -->
    <path d="M 275,212 L 275,175" stroke="url(#gold-metallic)" stroke-width="3" stroke-linecap="round" />
    <path d="M 290,212 L 290,150" stroke="url(#gold-metallic)" stroke-width="3" stroke-linecap="round" />
    <path d="M 315,212 L 315,130" stroke="url(#gold-metallic)" stroke-width="3.5" stroke-linecap="round" />

    <!-- Bold Upward Trend Arrow -->
    <path d="M 250,205 L 300,140 L 335,95" fill="none" stroke="url(#gold-metallic)" stroke-width="5" stroke-linecap="round" />
    <path d="M 310,93 L 340,90 L 337,120 Z" fill="url(#gold-metallic)" stroke="url(#gold-metallic)" stroke-width="1.5" stroke-linejoin="round" />
  </g>

  <!-- ========================================== -->
  <!-- 🔠 NAQLA TYPOGRAPHY (Middle Section) -->
  <!-- ========================================== -->
  
  <!-- "NAQLA" Wordmark -->
  <!-- We use clean, modern geometric letters rendered with paths to ensure cross-device consistency without font dependencies -->
  <g id="naqla-wordmark" transform="translate(145, 345)" filter="url(#subtle-shadow)">
    <!-- Letter N with tech circuit decoration -->
    <path d="M 5,35 L 5,5 M 5,5 L 28,35 M 28,35 L 28,5" stroke="#1C0E0A" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <circle cx="5" cy="5" r="3.5" fill="url(#gold-metallic)" />
    <circle cx="28" cy="35" r="3.5" fill="url(#gold-metallic)" />
    
    <!-- Letter A -->
    <path d="M 38,35 L 50,5 L 62,35 M 43,23 L 57,23" stroke="#1C0E0A" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    
    <!-- Letter Q -->
    <path d="M 83,20 C 83,29 76,36 67,36 C 58,36 51,29 51,20 C 51,11 58,4 67,4 C 76,4 83,11 83,20 Z M 77,30 L 89,42" stroke="#1C0E0A" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    
    <!-- Letter L -->
    <path d="M 97,5 L 97,35 L 117,35" stroke="#1C0E0A" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    
    <!-- Letter A -->
    <path d="M 125,35 L 137,5 L 149,35 M 130,23 L 144,23" stroke="#1C0E0A" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  </g>

  <!-- ========================================== -->
  <!-- 🇸🇩 ARABIC SUBTITLE (Bottom Section) -->
  <!-- ========================================== -->
  
  <text x="250" y="422" 
        font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" 
        font-size="16" 
        font-weight="900" 
        fill="#5C2C16" 
        text-anchor="middle" 
        letter-spacing="0.5">منصة المناهج الإلكترونية التفاعلية</text>
</svg>
